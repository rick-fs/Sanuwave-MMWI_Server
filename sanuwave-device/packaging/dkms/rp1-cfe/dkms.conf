PACKAGE_NAME="rp1-cfe-sanuwave"
PACKAGE_VERSION="1.0"

# Module is built by the out-of-tree Makefile as rp1-cfe.ko.  It lands in
# /lib/modules/$(uname -r)/updates/, which depmod prefers over the stock
# /lib/modules/$(uname -r)/kernel/drivers/media/platform/raspberrypi/rp1_cfe/
# location.  A /etc/modprobe.d/rp1-cfe-sanuwave.conf entry added by the
# package postinst belt-and-suspenders this by explicitly pointing modprobe
# at the patched module.
BUILT_MODULE_NAME[0]="rp1-cfe"
DEST_MODULE_LOCATION[0]="/updates"

# Apply the SANUWAVE strobe patch to the vendored stock cfe.c before building.
PATCH[0]="rp1-cfe-sanuwave-strobe.patch"
PATCH_MATCH[0]="."

# Autobuild on kernel upgrades.
AUTOINSTALL="yes"

# Since we ship the stock sources alongside the patch, nothing extra needs
# to be fetched from the kernel-headers package beyond the normal .h files
# used by every out-of-tree build.
MAKE[0]="make -C /lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C /lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"
